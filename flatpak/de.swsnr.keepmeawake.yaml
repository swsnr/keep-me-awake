id: de.swsnr.keepmeawake
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: de.swsnr.keepmeawake
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'
modules:
  - name: libportal
    buildsystem: meson
    config-opts:
      - -Dbackend-gtk3=disabled
      - -Dbackend-gtk4=enabled
      - -Dportal-tests=false
      - -Dvapi=false
      - -Ddocs=false
    sources:
      - type: git
        url: https://github.com/flatpak/libportal
        tag: 0.9.1
        commit: 8f5dc8d192f6e31dafe69e35219e3b707bde71ce
        x-checker-data:
          type: git
          is-important: true
          tag-pattern: ^([\d.]+)$
  - pip-build.json
  - name: keepmeawake
    buildsystem: simple
    sources:
      - type: git
        url: https://codeberg.org/swsnr/keep-me-awake
        tag: v2.0.0a1
        commit: ddd9ab9838aebc9facb2113af96e09bea9125aef
    build-commands:
      # Crudely assert that we're not on a -dev version
      - grep version pyproject.toml | grep -qv -- '[.-]dev'
      - pip3 install --verbose --exists-action=i --no-index --no-deps --prefix=${FLATPAK_DEST} --no-build-isolation .
